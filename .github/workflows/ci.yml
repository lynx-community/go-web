name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck

  build-example:
    name: Build Example App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --no-frozen-lockfile
      - run: cd example && pnpm install --no-frozen-lockfile && pnpm prepare:clean

      - name: Checkout vue-lynx
        uses: actions/checkout@v4
        with:
          repository: huxpro/vue-lynx
          path: _vue-lynx

      - name: Prepare vue-lynx examples (install, build, copy)
        run: cd example && node scripts/prepare-vue-lynx-examples.js --local ../_vue-lynx --build

      - run: cd example && pnpm build

  build-rspress:
    name: Build Rspress Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --no-frozen-lockfile
      - run: cd example-rspress && pnpm install --no-frozen-lockfile && pnpm prepare:clean && pnpm build
